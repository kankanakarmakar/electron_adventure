<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:hsl(270, 100%, 70%);stop-opacity:1" />
      <stop offset="100%" style="stop-color:hsl(250, 100%, 60%);stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Hexagon -->
  <polygon points="50,10 85,30 85,70 50,90 15,70 15,30" fill="url(#grad)" stroke="hsl(280, 100%, 80%)" stroke-width="3"/>
  
  <!-- Center node -->
  <circle cx="50" cy="50" r="8" fill="hsl(280, 100%, 90%)"/>
  
  <!-- Circuit traces -->
  <line x1="30" y1="50" x2="42" y2="50" stroke="hsl(280, 100%, 80%)" stroke-width="2"/>
  <line x1="58" y1="50" x2="70" y2="50" stroke="hsl(280, 100%, 80%)" stroke-width="2"/>
  <line x1="50" y1="30" x2="50" y2="42" stroke="hsl(280, 100%, 80%)" stroke-width="2"/>
  <line x1="50" y1="58" x2="50" y2="70" stroke="hsl(280, 100%, 80%)" stroke-width="2"/>
</svg>
